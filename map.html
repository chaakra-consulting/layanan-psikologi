<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Journey Route Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        /* Stylized SVG Map Text styling */
        .map-date {
            fill: #94a3b8;
            font-size: 11px;
            font-weight: 500;
            text-anchor: middle;
        }

        .map-title {
            fill: #1e293b;
            font-size: 14px;
            font-weight: 700;
            text-anchor: middle;
        }

        .map-badge-text {
            fill: #ffffff;
            font-size: 10px;
            font-weight: 700;
            text-anchor: middle;
            letter-spacing: 0.02em;
        }

        /* Pulse animation for active journey pins */
        @keyframes pinPulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .pulse-pin {
            animation: pinPulse 2s infinite ease-in-out;
        }
    </style>
</head>

        const panelStep = document.getElementById('panel-step');
        const panelDesc = document.getElementById('panel-desc');

        // SVG Path Definition for a stylized marker loop pin (Teardrop matching reference image)
        const pinTeardropVector = "M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z";

        // Map Canvas Population Function
        function renderTimelineMap() {
            journeyTimeline.forEach((point, index) => {
                // Main SVG Group Node Wrapper
                const nodeGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                nodeGroup.setAttribute("class", "cursor-pointer group");
                nodeGroup.setAttribute("id", `map-node-${index}`);
                nodeGroup.addEventListener('click', (e) => {
                    e.stopPropagation();
                    activateNode(index);
                });

                // Marker Placement Wrapper
                const pinWrap = document.createElementNS("http://www.w3.org/2000/svg", "g");
                pinWrap.setAttribute("transform", `translate(${point.x - 14}, ${point.y - 28}) scale(1.15)`);
                pinWrap.setAttribute("class", "origin-bottom transition-all duration-300 group-hover:-translate-y-1.5 group-hover:scale-125");

                // White backdrop shape for clarity on gray map background
                const pinBase = document.createElementNS("http://www.w3.org/2000/svg", "path");
                pinBase.setAttribute("d", pinTeardropVector);
                pinBase.setAttribute("fill", "#ffffff");

                // High contrast colored rim border line
                const pinBorder = document.createElementNS("http://www.w3.org/2000/svg", "path");
                pinBorder.setAttribute("d", pinTeardropVector);
                pinBorder.setAttribute("fill", "none");
                pinBorder.setAttribute("stroke", point.color);
                pinBorder.setAttribute("stroke-width", "2.5");

                // Centered anchor dot inner point
                const pinInnerDot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                pinInnerDot.setAttribute("cx", "12");
                pinInnerDot.setAttribute("cy", "9");
                pinInnerDot.setAttribute("r", "3");
                pinInnerDot.setAttribute("fill", point.color);

                pinWrap.appendChild(pinBase);
                pinWrap.appendChild(pinBorder);
                pinWrap.appendChild(pinInnerDot);

                // Chronology Date Text Label
                const txtDate = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txtDate.setAttribute("x", point.x);
                txtDate.setAttribute("y", point.y + 16);
                txtDate.setAttribute("class", "map-date");
                txtDate.textContent = point.date;

                // Title Label text string
                const txtTitle = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txtTitle.setAttribute("x", point.x);
                txtTitle.setAttribute("y", point.y + 32);
                txtTitle.setAttribute("class", "map-title group-hover:fill-slate-900 transition-colors");
                txtTitle.textContent = point.title;

                // Pill Shaped Label Container Shape
                const bgPill = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                const pillW = 76, pillH = 18;
                bgPill.setAttribute("x", point.x - (pillW / 2));
                bgPill.setAttribute("y", point.y + 40);
                bgPill.setAttribute("width", pillW);
                bgPill.setAttribute("height", pillH);
                bgPill.setAttribute("rx", pillH / 2);
                bgPill.setAttribute("fill", point.color);

                // Inner text content for the indicator pill
                const txtPill = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txtPill.setAttribute("x", point.x);
                txtPill.setAttribute("y", point.y + 52);
                txtPill.setAttribute("class", "map-badge-text");
                txtPill.textContent = point.label;

                // Assemble components sequentially
                nodeGroup.appendChild(pinWrap);
                nodeGroup.appendChild(txtDate);
                nodeGroup.appendChild(txtTitle);
                nodeGroup.appendChild(bgPill);
                nodeGroup.appendChild(txtPill);

                nodesContainer.appendChild(nodeGroup);
            });
        }

        // Selection / Navigation Trigger Engine
        function activateNode(index) {
            currentActiveIndex = index;
            const item = journeyTimeline[index];

            // Clear previous highlighting classes from map nodes
            journeyTimeline.forEach((_, idx) => {
                const groupEl = document.getElementById(`map-node-${idx}`);
                if (groupEl) groupEl.querySelector('g').classList.remove('pulse-pin');
            });

            // Set pulse animation class onto the active selected element pin group
            const activeGroup = document.getElementById(`map-node-${index}`);
            if (activeGroup) activeGroup.querySelector('g').classList.add('pulse-pin');

            // Map data items smoothly to interface modal inputs
            panelTitle.textContent = item.title;
            panelDesc.textContent = item.desc;
            panelStep.textContent = `Chronological Route Sequence: Node #${item.id} of ${journeyTimeline.length}`;

            panelDate.textContent = item.date;
            panelDate.style.backgroundColor = item.color;

            // Trigger structural view state transitions
            backdrop.classList.remove('hidden');
            setTimeout(() => backdrop.classList.remove('opacity-0'), 10);

            infoPanel.classList.remove('translate-y-full', 'md:opacity-0', 'md:pointer-events-none');
        }

        function closePopup() {
            backdrop.classList.add('opacity-0');
            setTimeout(() => backdrop.classList.add('hidden'), 300);

            infoPanel.classList.add('translate-y-full', 'md:opacity-0', 'md:pointer-events-none');

            // Clean active pulses
            journeyTimeline.forEach((_, idx) => {
                const groupEl = document.getElementById(`map-node-${idx}`);
                if (groupEl) groupEl.querySelector('g').classList.remove('pulse-pin');
            });
            currentActiveIndex = -1;
        }

        // Timeline Arrow Control Functions
        function navigateTimeline(direction) {
            let nextIndex = currentActiveIndex + direction;
            if (nextIndex >= journeyTimeline.length) nextIndex = 0;
            if (nextIndex < 0) nextIndex = journeyTimeline.length - 1;
            activateNode(nextIndex);
        }

        // Initialize Application
        renderTimelineMap();
        document.getElementById('journey-map').addEventListener('click', closePopup);
    </script>
</body>

</html>
